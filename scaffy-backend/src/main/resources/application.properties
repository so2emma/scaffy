server.port=8080
spring.application.name=scaffy-backend

# PostgreSQL — env vars override for Docker, defaults for local dev
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/scaffy_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:scaffy}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:scaffy_secret}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
scaffy.jwt.secret=${SCAFFY_JWT_SECRET:dev-only-secret-replace-in-prod-must-be-256-bits-long}
scaffy.jwt.expiration-ms=86400000

# Admin seeder (override with env vars in production)
scaffy.admin.email=${SCAFFY_ADMIN_EMAIL:admin@scaffy.dev}
scaffy.admin.username=${SCAFFY_ADMIN_USERNAME:admin}
scaffy.admin.password=${SCAFFY_ADMIN_PASSWORD:Scaffy@Admin2024!}
